<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integration Calculator with Graph</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #4f46e5; --bg: #f3f4f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 480px; box-sizing: border-box; }
        h2 { text-align: center; color: var(--p); margin-top: 0; font-size: 1.4rem; }
        label { font-weight: 600; font-size: 0.9rem; color: #374151; }
        input { width: 100%; padding: 12px; margin: 6px 0 14px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: var(--p); color: #fff; padding: 14px; border: none; border-radius: 6px; font-weight: 600; font-size: 16px; cursor: pointer; }
        #res { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; font-size: 0.95rem; word-break: break-all; }
        .graph-container { margin-top: 20px; position: relative; width: 100%; height: 230px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Integral Calc & Grapher</h2>
    <label>Function f(x)</label>
    <input type="text" id="eq" value="x^2">
    
    <div style="display:flex;gap:10px">
        <div style="flex:1"><label>Lower (a)</label><input type="text" id="a" value="0"></div>
        <div style="flex:1"><label>Upper (b)</label><input type="text" id="b" value="3"></div>
    </div>
    
    <button onclick="calcAndGraph()">Calculate & Plot</button>
    
    <div id="res"></div>
    
    <div class="graph-container">
        <canvas id="integralChart"></canvas>
    </div>
</div>

<script>
let myChart = null;

function calcAndGraph() {
    const eq = document.getElementById('eq').value;
    const aIn = document.getElementById('a').value;
    const bIn = document.getElementById('b').value;
    const resDiv = document.getElementById('res');
    
    try {
        const expr = math.compile(eq);
        const a = math.evaluate(aIn);
        const b = math.evaluate(bIn);
        
        if (isNaN(a) || isNaN(b)) throw new Error("Invalid limits");
        
        const f = (x) => expr.evaluate({x: x});
        
        // 1. Numerical Integration (Simpson's Rule)
        const steps = 1000;
        const h = (b - a) / steps;
        let sum = f(a) + f(b);
        for (let i = 1; i < steps; i++) {
            sum += (i % 2 === 0 ? 2 : 4) * f(a + i * h);
        }
        const integralValue = math.round((h / 3) * sum, 5);
        
        resDiv.style.display = "block";
        resDiv.style.background = "#ecfdf5";
        resDiv.style.borderLeft = "4px solid #10b981";
        resDiv.innerHTML = `<strong>Result:</strong> ∫(${eq}) dx = <b>${integralValue}</b>`;
        
        // 2. Generate Graph Data Points
        const graphPoints = 60;
        const padding = Math.max(1, Math.abs(b - a) * 0.4); 
        const minX = a - padding;
        const maxX = b + padding;
        const stepX = (maxX - minX) / graphPoints;
        
        const mainLineData = [];
        const shadedAreaData = [];
        
        for (let i = 0; i <= graphPoints; i++) {
            const currentX = minX + (i * stepX);
            const currentY = f(currentX);
            
            mainLineData.push({x: currentX, y: currentY});
            
            // If the point is within the bounds [a, b], map it to the shaded area dataset
            if (currentX >= a && currentX <= b) {
                shadedAreaData.push({x: currentX, y: currentY});
            }
        }
        // Ensure perfect boundaries for the shaded region edges
        if(shadedAreaData[0]?.x > a) shadedAreaData.unshift({x: a, y: f(a)});
        if(shadedAreaData[shadedAreaData.length-1]?.x < b) shadedAreaData.push({x: b, y: f(b)});

        // 3. Render Chart
        if (myChart) myChart.destroy(); // Clear old instance safely
        
        const ctx = document.getElementById('integralChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [
                    {
                        label: 'f(x)',
                        data: mainLineData,
                        showLine: true,
                        borderColor: '#4f46e5',
                        borderWidth: 2.5,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'Integrated Area',
                        data: shadedAreaData,
                        showLine: true,
                        borderColor: 'transparent',
                        pointRadius: 0,
                        backgroundColor: 'rgba(79, 70, 229, 0.25)',
                        fill: 'origin' // Fills down to y=0 line natively
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { type: 'linear', position: 'bottom', grid: { color: '#e5e7eb' } },
                    y: { type: 'linear', grid: { color: '#e5e7eb' } }
                }
            }
        });
        
    } catch (e) {
        resDiv.style.display = "block";
        resDiv.style.background = "#fef2f2";
        resDiv.style.borderLeft = "4px solid #ef4444";
        resDiv.innerText = "Error: " + (e.message || "Check syntax");
    }
}

// Draw initial state on view load
window.onload = calcAndGraph;
</script>
</body>
</html>
