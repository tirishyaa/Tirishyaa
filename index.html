<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Integration Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calculator-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary-color);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .limits-row {
            display: flex;
            gap: 15px;
        }

        .limits-row .input-group {
            flex: 1;
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        #result-container {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            background-color: #f9fafb;
            border-left: 4px solid #9ca3af;
            display: none;
        }

        #result-container.success {
            border-left-color: #10b981;
            background-color: #ecfdf5;
        }

        #result-container.error {
            border-left-color: #ef4444;
            background-color: #fef2f2;
        }

        .result-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .hint {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>Definite Integral Calculator</h2>
    
    <div class="input-group">
        <label for="expression">Function f(x)</label>
        <input type="text" id="expression" placeholder="e.g., 3x^2 + 2x + 1" value="x^2">
        <div class="hint">Supports standard math like: sin(x), cos(x), e^x, log(x)</div>
    </div>

    <div class="limits-row">
        <div class="input-group">
            <label for="lowerLimit">Lower Limit (a)</label>
            <input type="text" id="lowerLimit" value="0">
        </div>
        <div class="input-group">
            <label for="upperLimit">Upper Limit (b)</label>
            <input type="text" id="upperLimit" value="3">
        </div>
    </div>

    <button onclick="calculateIntegral()">Calculate</button>

    <div id="result-container">
        <div class="result-title" id="result-title">Result:</div>
        <div id="result-value"></div>
    </div>
</div>

<script>
    function calculateIntegral() {
        const exprString = document.getElementById('expression').value;
        const lowerInput = document.getElementById('lowerLimit').value;
        const upperInput = document.getElementById('upperLimit').value;
        
        const container = document.getElementById('result-container');
        const resultTitle = document.getElementById('result-title');
        const resultValue = document.getElementById('result-value');

        try {
            // Compile the math expression using math.js
            const parsedExpr = math.compile(exprString);
            
            // Evaluate limits (allows inputs like 'pi' or 'e')
            const a = math.evaluate(lowerInput);
            const b = math.evaluate(upperInput);

            if (isNaN(a) || isNaN(b)) {
                throw new Error("Limits must be valid numbers or math constants (like pi).");
            }

            // Define the function helper for the integrator
            const f = (x) => parsedExpr.evaluate({ x: x });

            // Numerical integration using Simpson's Rule
            const steps = 1000; // Even number for Simpson's rule accuracy
            const h = (b - a) / steps;
            
            let sum = f(a) + f(b);

            for (let i = 1; i < steps; i++) {
                const x = a + i * h;
                // Alternate multipliers 4 and 2 based on index
                sum += (i % 2 === 0 ? 2 : 4) * f(x);
            }

            const result = (h / 3) * sum;

            // Format result to prevent floating point anomalies (e.g., 9.00000000002)
            const roundedResult = math.round(result, 6);

            // Display Success
            container.className = "success";
            container.style.display = "block";
            resultTitle.innerText = "Calculated Value:";
            resultValue.innerHTML = `<strong>∫ (${exprString}) dx = ${roundedResult}</strong>`;

        } catch (error) {
            // Display Error
            container.className = "error";
            container.style.display = "block";
            resultTitle.innerText = "Error:";
            resultValue.innerText = error.message || "Invalid expression or math syntax.";
        }
    }
</script>

</body>
</html>
